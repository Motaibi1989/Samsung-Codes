<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#020617"/><stop offset=".55" stop-color="#082f49"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <radialGradient id="blue"><stop offset="0" stop-color="#38bdf8" stop-opacity=".28"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <radialGradient id="green"><stop offset="0" stop-color="#22c55e" stop-opacity=".20"/><stop offset="1" stop-color="#22c55e" stop-opacity="0"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#000" flood-opacity=".45"/></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#7dd3fc" stroke-width="1" opacity=".055"/></pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1040" cy="120" r="270" fill="url(#blue)"/>
  <circle cx="170" cy="540" r="260" fill="url(#green)"/>

  <rect x="70" y="58" width="1140" height="524" rx="36" fill="#020617" opacity=".74" stroke="#38bdf8" stroke-opacity=".24"/>

  <g font-family="Arial,Tahoma,sans-serif">
    <text x="118" y="125" font-size="34" font-weight="900" fill="#e0f2fe">أكواد سامسونج</text>
    <text x="118" y="195" font-size="64" font-weight="900" letter-spacing="4" fill="#ffffff">SAMSUNG</text>
    <text x="118" y="248" font-size="38" font-weight="900" letter-spacing="3" fill="#93c5fd">GALAXY CODES</text>
    <text x="118" y="305" font-size="24" font-weight="700" fill="#cbd5e1">دليل شامل للأكواد مع التعريف ودرجة الأمان</text>
  </g>

  <g transform="translate(118 360)" filter="url(#shadow)">
    <rect width="260" height="150" rx="28" fill="#08111f" stroke="#475569" stroke-width="3"/>
    <rect x="28" y="24" width="204" height="88" rx="20" fill="#111827"/>
    <text x="130" y="80" text-anchor="middle" font-family="Arial" font-size="46" font-weight="800" fill="#e0f2fe">*#06#</text>
    <text x="130" y="108" text-anchor="middle" font-family="Arial" font-size="15" fill="#cbd5e1">IMEI / Serial Number</text>
    <circle cx="130" cy="132" r="15" fill="#22c55e"/>
  </g>

  <g font-family="Arial,Tahoma,sans-serif" filter="url(#shadow)">
    <rect x="460" y="105" width="210" height="108" rx="22" fill="#052e16" stroke="#22c55e" stroke-opacity=".75"/>
    <circle cx="500" cy="156" r="17" fill="#22c55e"/>
    <text x="538" y="163" font-size="31" font-weight="900" fill="#dcfce7">آمن</text>
    <text x="500" y="193" font-size="17" fill="#bbf7d0">للعرض والفحص فقط</text>

    <rect x="705" y="105" width="210" height="108" rx="22" fill="#422006" stroke="#facc15" stroke-opacity=".75"/>
    <circle cx="745" cy="156" r="17" fill="#facc15"/>
    <text x="783" y="163" font-size="31" font-weight="900" fill="#fef9c3">حساس</text>
    <text x="745" y="193" font-size="17" fill="#fde68a">لا تغيّر الإعدادات</text>

    <rect x="950" y="105" width="210" height="108" rx="22" fill="#450a0a" stroke="#ef4444" stroke-opacity=".75"/>
    <circle cx="990" cy="156" r="17" fill="#ef4444"/>
    <text x="1028" y="163" font-size="31" font-weight="900" fill="#fee2e2">خطر</text>
    <text x="990" y="193" font-size="17" fill="#fecaca">قد يمسح البيانات</text>
  </g>

  <g transform="translate(460 265)" font-family="Arial,Tahoma,sans-serif" filter="url(#shadow)">
    <rect width="700" height="215" rx="28" fill="#07111f" stroke="#334155"/>
    <text x="650" y="48" text-anchor="end" font-size="31" font-weight="900" fill="#ffffff">أمثلة مهمة</text>
    <line x1="42" y1="70" x2="660" y2="70" stroke="#334155"/>
    <text x="650" y="112" text-anchor="end" font-size="24" font-weight="800" fill="#86efac">*#06# — IMEI / Serial</text>
    <text x="650" y="153" text-anchor="end" font-size="24" font-weight="800" fill="#86efac">*#0*# — فحص الشاشة والحساسات</text>
    <text x="650" y="194" text-anchor="end" font-size="24" font-weight="800" fill="#fde047">*#0808# — إعدادات USB</text>
    <text x="650" y="235" text-anchor="end" font-size="24" font-weight="800" fill="#fca5a5">*2767*3855# — Full Factory Reset</text>
  </g>

  <g font-family="Arial,Tahoma,sans-serif">
    <rect x="460" y="515" width="700" height="44" rx="16" fill="#0f172a" stroke="#475569"/>
    <text x="810" y="544" text-anchor="middle" font-size="18" font-weight="700" fill="#e2e8f0">استخدم الأكواد الآمنة للمشاهدة فقط وخذ نسخة احتياطية قبل Reset أو CSC</text>
  </g>
</svg>