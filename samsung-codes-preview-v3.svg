<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1120" cy="80" r="220" fill="#bfdbfe" opacity="0.65"/>
  <circle cx="90" cy="570" r="210" fill="#bbf7d0" opacity="0.55"/>

  <rect x="56" y="56" width="1168" height="528" rx="42" fill="#ffffff" filter="url(#shadow)"/>

  <g font-family="Arial,Tahoma,sans-serif">
    <rect x="96" y="96" width="245" height="54" rx="27" fill="#e0f2fe"/>
    <text x="218" y="132" text-anchor="middle" font-size="24" font-weight="800" fill="#0369a1">Samsung Galaxy</text>

    <text x="96" y="230" font-size="74" font-weight="900" fill="#0f172a">Samsung Codes</text>
    <text x="96" y="292" font-size="44" font-weight="900" fill="#2563eb">أكواد سامسونج</text>
    <text x="96" y="346" font-size="27" font-weight="700" fill="#475569">دليل سريع للأكواد مع التعريف ودرجة الأمان</text>
  </g>

  <g transform="translate(96 410)" font-family="Arial,Tahoma,sans-serif">
    <rect width="230" height="78" rx="22" fill="#dcfce7"/>
    <circle cx="38" cy="39" r="13" fill="#22c55e"/>
    <text x="66" y="47" font-size="25" font-weight="900" fill="#166534">آمن</text>

    <rect x="252" width="230" height="78" rx="22" fill="#fef9c3"/>
    <circle cx="290" cy="39" r="13" fill="#facc15"/>
    <text x="318" y="47" font-size="25" font-weight="900" fill="#854d0e">حساس</text>

    <rect x="504" width="230" height="78" rx="22" fill="#fee2e2"/>
    <circle cx="542" cy="39" r="13" fill="#ef4444"/>
    <text x="570" y="47" font-size="25" font-weight="900" fill="#991b1b">خطر</text>
  </g>

  <g transform="translate(855 105)" filter="url(#shadow)">
    <rect width="260" height="430" rx="44" fill="#0f172a"/>
    <rect x="18" y="24" width="224" height="382" rx="32" fill="#020617"/>
    <circle cx="130" cy="42" r="6" fill="#334155"/>
    <text x="130" y="125" text-anchor="middle" font-family="Arial,Tahoma,sans-serif" font-size="54" font-weight="900" fill="#e0f2fe">*#06#</text>
    <text x="130" y="160" text-anchor="middle" font-family="Arial,Tahoma,sans-serif" font-size="16" fill="#94a3b8">IMEI / Serial</text>

    <g font-family="Arial,Tahoma,sans-serif" font-size="24" font-weight="800" fill="#e2e8f0" text-anchor="middle">
      <rect x="42" y="205" width="48" height="42" rx="12" fill="#1e293b"/><text x="66" y="234">1</text>
      <rect x="106" y="205" width="48" height="42" rx="12" fill="#1e293b"/><text x="130" y="234">2</text>
      <rect x="170" y="205" width="48" height="42" rx="12" fill="#1e293b"/><text x="194" y="234">3</text>
      <rect x="42" y="263" width="48" height="42" rx="12" fill="#1e293b"/><text x="66" y="292">*</text>
      <rect x="106" y="263" width="48" height="42" rx="12" fill="#1e293b"/><text x="130" y="292">0</text>
      <rect x="170" y="263" width="48" height="42" rx="12" fill="#1e293b"/><text x="194" y="292">#</text>
    </g>
    <circle cx="130" cy="350" r="28" fill="#22c55e"/>
  </g>

  <g font-family="Arial,Tahoma,sans-serif">
    <rect x="96" y="520" width="690" height="42" rx="21" fill="url(#blue)"/>
    <text x="441" y="548" text-anchor="middle" font-size="19" font-weight="800" fill="#ffffff">Use safe codes for viewing only — Backup before Reset or CSC</text>
  </g>
