<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset=".55" stop-color="#082f49"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Glowing Effects -->
    <radialGradient id="g1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".32"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2">
      <stop offset="0" stop-color="#22c55e" stop-opacity=".24"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Drop Shadow Filter -->
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".45"/>
    </filter>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 40 40 L 0 40" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Base Layers -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  
  <!-- Background Glows -->
  <circle cx="1040" cy="120" r="270" fill="url(#g1)"/>
  <circle cx="160" cy="540" r="250" fill="url(#g2)"/>

  <!-- Outer Frame -->
  <rect x="54" y="54" width="1172" height="532" rx="36" fill="#020617" opacity=".70" stroke="#38bdf8" stroke-opacity=".25"/>

  <!-- Main Header Section (Right-Aligned for RTL Arabic Layout) -->
  <g font-family="Arial,Tahoma,sans-serif">
    <text x="410" y="126" text-anchor="end" font-size="40" font-weight="900" fill="#e0f2fe">أكواد سامسونج</text>
    <text x="410" y="206" text-anchor="end" font-size="78" font-weight="900" letter-spacing="5" fill="#fff">SAMSUNG</text>
    <text x="410" y="265" text-anchor="end" font-size="44" font-weight="900" letter-spacing="3" fill="#93c5fd">GALAXY CODES</text>
    <text x="410" y="322" text-anchor="end" font-size="27" font-weight="700" fill="#cbd5e1">دليل شامل للأكواد مع التعريف ودرجة الأمان</text>
  </g>

  <!-- IMEI Card -->
  <g transform="translate(95 370)" filter="url(#s)">
    <rect width="250" height="155" rx="28" fill="#08111f" stroke="#475569" stroke-width="3"/>
    <rect x="24" y="24" width="202" height="92" rx="20" fill="#111827"/>
    <text x="125" y="80" text-anchor="middle" font-family="Arial" font-size="48" font-weight="800" fill="#e0f2fe">*#06#</text>
    <text x="125" y="108" text-anchor="middle" font-family="Arial" font-size="15" fill="#cbd5e1">IMEI / Serial Number</text>
    <circle cx="125" cy="134" r="15" fill="#22c55e"/>
  </g>

  <!-- Color-Coded Safety Indicators (Centered Layout) -->
  <g font-family="Arial,Tahoma,sans-serif" filter="url(#s)">
    <!-- Safe -->
    <rect x="430" y="96" width="220" height="118" rx="22" fill="#052e16" stroke="#22c55e" stroke-opacity=".75"/>
    <circle cx="540" cy="153" r="18" fill="#22c55e"/>
    <text x="540" y="160" text-anchor="middle" font-size="32" font-weight="900" fill="#dcfce7">آمن</text>
    <text x="540" y="192" text-anchor="middle" font-size="18" fill="#bbf7d0">للعرض والفحص فقط</text>

    <!-- Sensitive -->
    <rect x="685" y="96" width="220" height="118" rx="22" fill="#422006" stroke="#facc15" stroke-opacity=".75"/>
    <circle cx="795" cy="153" r="18" fill="#facc15"/>
    <text x="795" y="160" text-anchor="middle" font-size="32" font-weight="900" fill="#fef9c3">حساس</text>
    <text x="795" y="192" text-anchor="middle" font-size="18" fill="#fde68a">لا تغيّر الإعدادات</text>

    <!-- Dangerous -->
    <rect x="940" y="96" width="220" height="118" rx="22" fill="#450a0a" stroke="#ef4444" stroke-opacity=".75"/>
    <circle cx="1050" cy="153" r="18" fill="#ef4444"/>
    <text x="1050" y="160" text-anchor="middle" font-size="32" font-weight="900" fill="#fee2e2">خطر</text>
    <text x="1050" y="192" text-anchor="middle" font-size="18" fill="#fecaca">قد يمسح البيانات</text>
  </g>

  <!-- Examples Box (Centered Layout) -->
  <g transform="translate(430 255)" font-family="Arial,Tahoma,sans-serif" filter="url(#s)">
    <rect width="730" height="230" rx="28" fill="#07111f" stroke="#334155"/>
    <text x="365" y="50" text-anchor="middle" font-size="32" font-weight="900" fill="#fff">أمثلة مهمة</text>
    <line x1="42" y1="72" x2="688" y2="72" stroke="#334155"/>
    
    <text x="365" y="115" text-anchor="middle" font-size="25" font-weight="800" fill="#86efac">*#06# — IMEI / Serial</text>
    <text x="365" y="158" text-anchor="middle" font-size="25" font-weight="800" fill="#86efac">*#0*# — فحص الشاشة والحساسات</text>
    <text x="365" y="201" text-anchor="middle" font-size="25" font-weight="800" fill="#fde047">*#0808# — إعدادات USB</text>
    <text x="365" y="244" text-anchor="middle" font-size="25" font-weight="800" fill="#fca5a5">*2767*3855# — Full Factory Reset</text>
  </g>

  <!-- Bottom Warning Bar (Centered Layout) -->
  <g font-family="Arial,Tahoma,sans-serif">
    <rect x="430" y="515" width="730" height="46" rx="16" fill="#0f172a" stroke="#475569"/>
    <text x="795" y="545" text-anchor="middle" font-size="19" font-weight="700" fill="#e2e8f0">استخدم الأكواد الآمنة للمشاهدة فقط وخذ نسخة احتياطية قبل Reset أو CSC</text>
  </g>
</svg>