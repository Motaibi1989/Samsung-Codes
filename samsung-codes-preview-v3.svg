<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.48" stop-color="#071d3a"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity="0.48"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.055"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1030" cy="95" r="285" fill="url(#blueGlow)"/>
  <circle cx="160" cy="570" r="270" fill="url(#greenGlow)"/>

  <rect x="46" y="42" width="1188" height="556" rx="38" fill="#020617" opacity="0.62" stroke="#38bdf8" stroke-opacity="0.26"/>

  <g font-family="Arial,Tahoma,sans-serif">
    <text x="96" y="122" font-size="38" font-weight="900" fill="#e0f2fe">أكواد سامسونج</text>
    <text x="96" y="198" font-size="72" font-weight="900" letter-spacing="4" fill="#ffffff">SAMSUNG</text>
    <text x="96" y="255" font-size="43" font-weight="900" letter-spacing="3" fill="#93c5fd">GALAXY CODES</text>
    <text x="96" y="312" font-size="25" font-weight="700" fill="#cbd5e1">دليل سريع للأكواد مع التعريف ودرجة الأمان</text>
  </g>

  <g transform="translate(98 360)" filter="url(#shadow)">
    <rect width="260" height="168" rx="30" fill="url(#glass)" stroke="#475569" stroke-width="2.5"/>
    <rect x="24" y="24" width="212" height="98" rx="22" fill="#111827"/>
    <text x="130" y="83" text-anchor="middle" font-family="Arial,Tahoma,sans-serif" font-size="50" font-weight="900" fill="#e0f2fe">*#06#</text>
    <text x="130" y="113" text-anchor="middle" font-family="Arial,Tahoma,sans-serif" font-size="15" fill="#cbd5e1">IMEI / Serial Number</text>
    <circle cx="130" cy="145" r="16" fill="#22c55e"/>
    <path d="M122 145l5 5 12-14" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g font-family="Arial,Tahoma,sans-serif" filter="url(#soft)">
    <rect x="410" y="86" width="235" height="126" rx="24" fill="#052e16" stroke="#22c55e" stroke-opacity="0.75"/>
    <circle cx="450" cy="145" r="17" fill="#22c55e"/>
    <text x="490" y="151" font-size="32" font-weight="900" fill="#dcfce7">آمن</text>
    <text x="450" y="184" font-size="18" fill="#bbf7d0">للعرض والفحص فقط</text>

    <rect x="675" y="86" width="235" height="126" rx="24" fill="#422006" stroke="#facc15" stroke-opacity="0.75"/>
    <circle cx="715" cy="145" r="17" fill="#facc15"/>
    <text x="755" y="151" font-size="32" font-weight="900" fill="#fef9c3">حساس</text>
    <text x="715" y="184" font-size="18" fill="#fde68a">لا تغيّر الإعدادات</text>

    <rect x="940" y="86" width="235" height="126" rx="24" fill="#450a0a" stroke="#ef4444" stroke-opacity="0.75"/>
    <circle cx="980" cy="145" r="17" fill="#ef4444"/>
    <text x="1020" y="151" font-size="32" font-weight="900" fill="#fee2e2">خطر</text>
    <text x="980" y="184" font-size="18" fill="#fecaca">قد يمسح البيانات</text>
  </g>

  <g transform="translate(410 248)" font-family="Arial,Tahoma,sans-serif" filter="url(#shadow)">
    <rect width="765" height="248" rx="30" fill="url(#glass)" stroke="#334155"/>
    <text x="712" y="52" text-anchor="end" font-size="32" font-weight="900" fill="#ffffff">أمثلة مهمة</text>
    <line x1="44" y1="76" x2="720" y2="76" stroke="#334155"/>

    <rect x="44" y="94" width="676" height="34" rx="10" fill="#052e16" opacity="0.42"/>
    <text x="696" y="119" text-anchor="end" font-size="23" font-weight="800" fill="#86efac">*#06# — IMEI / Serial</text>

    <rect x="44" y="137" width="676" height="34" rx="10" fill="#052e16" opacity="0.32"/>
    <text x="696" y="162" text-anchor="end" font-size="23" font-weight="800" fill="#86efac">*#0*# — فحص الشاشة والحساسات</text>

    <rect x="44" y="180" width="676" height="34" rx="10" fill="#422006" opacity="0.38"/>
    <text x="696" y="205" text-anchor="end" font-size="23" font-weight="800" fill="#fde047">*#0808# — إعدادات USB</text>

    <rect x="44" y="223" width="676" height="34" rx="10" fill="#450a0a" opacity="0.42"/>
    <text x="696" y="248" text-anchor="end" font-size="23" font-weight="800" fill="#fca5a5">*2767*3855# — Full Factory Reset</text>
  </g>

  <g font-family="Arial,Tahoma,sans-serif" filter="url(#soft)">
    <rect x="410" y="522" width="765" height="48" rx="17" fill="#0f172a" stroke="#475569"/>
    <text x="792" y="552" text-anchor="middle" font-size="19" font-weight="700" fill="#e2e8f0">استخدم الأكواد الآمنة للمشاهدة فقط، وخذ نسخة احتياطية قبل Reset أو CSC</text>
  </g>
</svg>