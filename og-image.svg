<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.45" stop-color="#082f49"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGreen" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phoneGlass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172554"/>
      <stop offset="0.5" stop-color="#020617"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#020617" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity="0.32"/>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" fill="none" stroke="#7dd3fc" stroke-width="1" opacity="0.07"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>
  <circle cx="1045" cy="110" r="280" fill="url(#glowBlue)"/>
  <circle cx="150" cy="560" r="260" fill="url(#glowGreen)"/>

  <rect x="34" y="34" width="1212" height="572" rx="40" fill="#020617" opacity="0.52" stroke="#38bdf8" stroke-opacity="0.26"/>

  <g transform="translate(72 78)">
    <text x="0" y="0" font-family="Arial,Tahoma,sans-serif" font-size="38" font-weight="900" fill="#e0f2fe">أكواد سامسونج</text>
    <text x="0" y="78" font-family="Arial,Tahoma,sans-serif" font-size="82" font-weight="900" letter-spacing="5" fill="#ffffff">SAMSUNG</text>
    <text x="0" y="138" font-family="Arial,Tahoma,sans-serif" font-size="46" font-weight="900" letter-spacing="4" fill="#60a5fa">GALAXY CODES</text>
    <text x="0" y="190" font-family="Arial,Tahoma,sans-serif" font-size="25" font-weight="700" fill="#cbd5e1">دليل شامل للأكواد مع التعريف ودرجة الأمان</text>
  </g>

  <g transform="translate(82 300)" filter="url(#shadow)">
    <rect width="255" height="282" rx="42" fill="#020617" stroke="#64748b" stroke-width="4"/>
    <rect x="18" y="20" width="219" height="242" rx="30" fill="url(#phoneGlass)"/>
    <circle cx="128" cy="34" r="6" fill="#020617" stroke="#475569"/>
    <text x="128" y="98" text-anchor="middle" font-family="Arial,Tahoma,sans-serif" font-size="50" font-weight="800" fill="#e0f2fe">*#06#</text>
    <text x="128" y="132" text-anchor="middle" font-family="Arial,Tahoma,sans-serif" font-size="15" fill="#cbd5e1">IMEI / Serial Number</text>
    <rect x="43" y="154" width="170" height="74" rx="18" fill="#0f172a" opacity="0.88"/>
    <text x="75" y="184" text-anchor="middle" font-family="Arial" font-size="25" fill="#f8fafc">1</text>
    <text x="128" y="184" text-anchor="middle" font-family="Arial" font-size="25" fill="#f8fafc">2</text>
    <text x="181" y="184" text-anchor="middle" font-family="Arial" font-size="25" fill="#f8fafc">3</text>
    <text x="75" y="216" text-anchor="middle" font-family="Arial" font-size="25" fill="#f8fafc">*</text>
    <text x="128" y="216" text-anchor="middle" font-family="Arial" font-size="25" fill="#f8fafc">0</text>
    <text x="181" y="216" text-anchor="middle" font-family="Arial" font-size="25" fill="#f8fafc">#</text>
    <circle cx="128" cy="246" r="18" fill="#22c55e"/>
    <path d="M120 246c10 10 18 7 23 0" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g transform="translate(382 82)" filter="url(#soft)" font-family="Arial,Tahoma,sans-serif">
    <rect x="0" y="0" width="810" height="148" rx="26" fill="url(#panel)" stroke="#334155"/>
    <g transform="translate(28 28)">
      <rect width="228" height="92" rx="20" fill="#052e16" stroke="#22c55e" stroke-opacity="0.75"/>
      <circle cx="40" cy="46" r="17" fill="#22c55e"/>
      <text x="72" y="43" font-size="31" font-weight="900" fill="#dcfce7">آمن</text>
      <text x="72" y="72" font-size="17" fill="#bbf7d0">للمشاهدة والفحص</text>
    </g>
    <g transform="translate(292 28)">
      <rect width="228" height="92" rx="20" fill="#422006" stroke="#facc15" stroke-opacity="0.75"/>
      <circle cx="40" cy="46" r="17" fill="#facc15"/>
      <text x="72" y="43" font-size="31" font-weight="900" fill="#fef9c3">حساس</text>
      <text x="72" y="72" font-size="17" fill="#fde68a">لا تغيّر بدون معرفة</text>
    </g>
    <g transform="translate(556 28)">
      <rect width="226" height="92" rx="20" fill="#450a0a" stroke="#ef4444" stroke-opacity="0.75"/>
      <circle cx="40" cy="46" r="17" fill="#ef4444"/>
      <text x="72" y="43" font-size="31" font-weight="900" fill="#fee2e2">خطر</text>
      <text x="72" y="72" font-size="17" fill="#fecaca">قد يمسح البيانات</text>
    </g>
  </g>

  <g transform="translate(382 260)" filter="url(#soft)" font-family="Arial,Tahoma,sans-serif">
    <rect width="810" height="238" rx="28" fill="url(#panel)" stroke="#334155"/>
    <text x="762" y="48" text-anchor="end" font-size="30" font-weight="900" fill="#ffffff">أهم الأكواد</text>
    <line x1="40" y1="70" x2="770" y2="70" stroke="#334155"/>
    <g font-size="23" font-weight="700">
      <text x="760" y="112" text-anchor="end" fill="#86efac">*#06#</text>
      <text x="560" y="112" text-anchor="end" fill="#e2e8f0">IMEI / Serial</text>
      <circle cx="55" cy="104" r="9" fill="#22c55e"/>
      <text x="760" y="154" text-anchor="end" fill="#86efac">*#0*#</text>
      <text x="560" y="154" text-anchor="end" fill="#e2e8f0">فحص الشاشة والحساسات</text>
      <circle cx="55" cy="146" r="9" fill="#22c55e"/>
      <text x="760" y="196" text-anchor="end" fill="#fde047">*#0808#</text>
      <text x="560" y="196" text-anchor="end" fill="#e2e8f0">إعدادات USB</text>
      <circle cx="55" cy="188" r="9" fill="#facc15"/>
      <text x="760" y="238" text-anchor="end" fill="#fca5a5">*2767*3855#</text>
      <text x="560" y="238" text-anchor="end" fill="#e2e8f0">Full Factory Reset</text>
      <circle cx="55" cy="230" r="9" fill="#ef4444"/>
    </g>
  </g>

  <g transform="translate(382 526)" font-family="Arial,Tahoma,sans-serif">
    <rect width="810" height="56" rx="20" fill="#0f172a" stroke="#475569"/>
    <text x="405" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">استخدم الأكواد الآمنة للمشاهدة فقط، وخذ نسخة احتياطية قبل Reset أو CSC</text>
  </g>
</svg>
